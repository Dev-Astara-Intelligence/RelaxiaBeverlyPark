                <div key={m} style={{flex:1,fontSize:10,color:C.ts,textAlign:'center',fontWeight:500}}>{m}</div>
              ))}
            </div>
            {events.map((e,i)=>{
              const months={Ene:0,Feb:1,Mar:2,Abr:3,May:4,Jun:5,Jul:6,Ago:7,Sep:8,Oct:9,Nov:10,Dic:11};
              const pd=s=>{const[d,m]=s.split(' ');return months[m]+(parseInt(d)/31);};
              const left=pd(e.start)/12*100,right=pd(e.end)/12*100;
              const width=Math.max(right-left,1.5/12*100);
              return(
                <div key={i} style={{position:'relative',height:17,marginBottom:3}}>
                  <div title={`${e.name} · ${e.start}${e.start!==e.end?' → '+e.end:''}`}
                       style={{position:'absolute',left:`${left}%`,width:`${width}%`,minWidth:4,height:'100%',background:ic[e.impact],borderRadius:3,opacity:0.85,display:'flex',alignItems:'center',paddingLeft:4,overflow:'hidden'}}>
                    <span style={{fontSize:8,color:'#fff',fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{e.name}</span>
                  </div>
                </div>
              );
            })}
            <div style={{display:'flex',gap:14,marginTop:8}}>
              {Object.entries(il).map(([k,v])=>(
                <span key={k} style={{display:'flex',alignItems:'center',gap:4,fontSize:10,color:C.ts}}>
                  <span style={{width:10,height:10,background:ic[k],borderRadius:2,display:'inline-block'}}/>{v}
                </span>
              ))}
            </div>
          </div>
        </div>
      </Card>
      <Card title="Todos los eventos monitorizados">
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead><tr><Th>Evento</Th><Th>Inicio</Th><Th>Fin</Th><Th>Zona</Th><Th>Impacto en demanda</Th></tr></thead>
            <tbody>
              {events.map((e,i)=>(
                <tr key={i}>
                  <Td bold={e.impact==='very_high'}>{e.name}</Td>
                  <Td>{e.start}</Td><Td>{e.end}</Td><Td>{e.zone}</Td>
                  <Td><span style={{display:'inline-flex',alignItems:'center',gap:4,background:ib[e.impact],color:ic[e.impact],fontSize:11,fontWeight:600,padding:'2px 10px',borderRadius:99}}><Dot impact={e.impact}/>{il[e.impact]}</span></Td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

function Voice(){
  const [selected,setSelected]=useState(null);
  const maxN=issues[0].n;

  const filteredReviews=useMemo(()=>{
    if(!selected) return negReviews;
    return negReviews.filter(r=>Array.isArray(r.tags)&&r.tags.includes(selected));
  },[selected]);

  const selectedLabel=selected?issues.find(i=>i.tag===selected)?.label:null;

  return(
    <div>
      <SectionTitle sub="Análisis de 20 reseñas negativas (1–3 estrellas) con texto completo · Google Maps · enero 2025 – febrero 2026">¿Qué preocupa al cliente?</SectionTitle>
      <Insight type="alert">
        El <strong>estado de las habitaciones</strong> es el problema más frecuente (en el 48% de las reseñas negativas) y aparece en todos los rangos de puntuación. El <strong>servicio en recepción</strong> es el más peligroso por impacto: 3 de sus 7 menciones vienen de reseñas de 1 estrella que denuncian incidentes graves como un robo no atendido o personal entrando sin avisar. Estos no son problemas puntuales — son patrones que se repiten en distintos idiomas y fechas.
      </Insight>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
        <Metric label="Reseñas analizadas" value="20" sub="de 171 reseñas con texto"/>
        <Metric label="Críticas graves (1 estrella)" value="6" sub="con incidentes serios" color={C.red}/>
        <Metric label="Moderadas (2 estrellas)" value="9" sub="con problemas claros" color={C.amber}/>
        <Metric label="Problema más frecuente" value="Habitaciones" sub="en el 48% de las negativas"/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'5fr 7fr',gap:16}}>
        <Card title="Frecuencia de problemas" sub="Haz clic en un problema para ver las reseñas donde aparece">
          <div style={{display:'flex',flexDirection:'column',gap:5}}>
            {issues.map(issue=>{
              const isSel=selected===issue.tag;
              const reviewCount=negReviews.filter(r=>Array.isArray(r.tags)&&r.tags.includes(issue.tag)).length;
              return(
                <div key={issue.tag} onClick={()=>setSelected(isSel?null:issue.tag)}
                     style={{cursor:'pointer',padding:'9px 11px',borderRadius:8,border:`1.5px solid ${isSel?C.teal:C.border}`,background:isSel?'#F0FAFB':'#FAFAFA'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                    <span style={{fontSize:12,fontWeight:isSel?600:400,color:isSel?C.teal:C.tp,lineHeight:1.3}}>{issue.label}</span>
                    <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
                      {reviewCount>0&&<span style={{fontSize:10,color:C.ts,background:'rgba(0,0,0,0.06)',padding:'1px 6px',borderRadius:99}}>{reviewCount} reseña{reviewCount!==1?'s':''}</span>}
                      <span style={{fontSize:13,fontWeight:700,color:isSel?C.teal:C.tp}}>{issue.n}</span>
                    </div>
                  </div>
                  <div style={{height:6,background:'#E2E8F0',borderRadius:3,overflow:'hidden'}}>
                    <div style={{display:'flex',height:'100%'}}>
                      <div style={{width:`${(issue.critical/maxN)*100}%`,background:C.red,minWidth:issue.critical?3:0}}/>
                      <div style={{width:`${(issue.moderate/maxN)*100}%`,background:C.amber,minWidth:issue.moderate?3:0}}/>
                      <div style={{width:`${(issue.minor/maxN)*100}%`,background:'#60A5FA',minWidth:issue.minor?3:0}}/>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:8,marginTop:4}}>
                    {issue.critical>0&&<span style={{fontSize:10,color:C.red,fontWeight:500}}>{issue.critical} crítica{issue.critical!==1?'s':''}</span>}
                    {issue.moderate>0&&<span style={{fontSize:10,color:C.amber,fontWeight:500}}>{issue.moderate} moderada{issue.moderate!==1?'s':''}</span>}
                    {issue.minor>0&&<span style={{fontSize:10,color:'#2563EB',fontWeight:500}}>{issue.minor} menor{issue.minor!==1?'es':''}</span>}
                  </div>
                </div>
              );
            })}
            <div style={{display:'flex',gap:12,marginTop:4,flexWrap:'wrap'}}>
              {[{c:C.red,l:'Crítica (1★)'},{c:C.amber,l:'Moderada (2★)'},{c:'#60A5FA',l:'Menor (3★)'}].map(x=>(
                <span key={x.l} style={{display:'flex',alignItems:'center',gap:4,fontSize:10,color:C.ts}}>
                  <span style={{width:8,height:8,background:x.c,borderRadius:2,display:'inline-block'}}/>{x.l}
                </span>
              ))}
            </div>
          </div>
        </Card>

        <Card title={selectedLabel?`Reseñas que mencionan: "${selectedLabel}"`:'Todas las reseñas negativas analizadas'}
              sub={selectedLabel?`${filteredReviews.length} reseña${filteredReviews.length!==1?'s':''} con este problema · haz clic de nuevo en el mismo problema para ver todas`:'Haz clic en un problema de la izquierda para filtrar'}>
          {selected&&(
            <div style={{marginBottom:10}}>
              <button onClick={()=>setSelected(null)} style={{fontSize:12,color:C.teal,background:'none',border:`1px solid ${C.teal}`,borderRadius:99,padding:'4px 14px',cursor:'pointer'}}>
                ← Ver todas las reseñas
              </button>
            </div>
          )}
          <div style={{display:'flex',flexDirection:'column',gap:10,maxHeight:570,overflowY:'auto',paddingRight:2}}>
            {filteredReviews.length===0&&(
              <div style={{padding:'32px',textAlign:'center',color:C.tm,fontSize:13}}>
                No hay reseñas con texto completo para este problema en la muestra analizada.
              </div>
            )}
            {filteredReviews.map(r=>{
              const sc={
                critical:{bg:'#FEF2F2',bc:'#FCA5A5',tc:'#991B1B',label:'Crítica'},
                moderate:{bg:'#FFFBEB',bc:'#FCD34D',tc:'#92400E',label:'Moderada'},
                minor:{bg:'#EFF6FF',bc:'#93C5FD',tc:'#1E40AF',label:'Menor'},
              }[r.severity]||{bg:'#EFF6FF',bc:'#93C5FD',tc:'#1E40AF',label:'Menor'};
              const lf={es:'🇪🇸',de:'🇩🇪',en:'🇬🇧',it:'🇮🇹',fr:'🇫🇷',nl:'🇳🇱',sv:'🇸🇪'}[r.lang]||'🌍';
              return(
                <div key={r.id} style={{border:`1px solid ${sc.bc}`,borderRadius:10,padding:'12px 14px',background:sc.bg,flexShrink:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,flexWrap:'wrap'}}>
                    <span style={{fontSize:14,letterSpacing:1,color:'#F59E0B'}}>{'★'.repeat(r.stars)}<span style={{color:'#E2E8F0'}}>{'★'.repeat(5-r.stars)}</span></span>
                    <span style={{fontSize:11,color:sc.tc,fontWeight:600,border:`1px solid ${sc.bc}`,padding:'1px 8px',borderRadius:99,background:'rgba(255,255,255,0.5)'}}>{sc.label}</span>
                    <span style={{fontSize:14}}>{lf}</span>
                    <span style={{fontSize:10,color:C.tm,marginLeft:'auto'}}>#{r.id}</span>
                  </div>
                  <p style={{fontSize:13,color:C.tp,lineHeight:1.6,margin:'0 0 8px'}}>{r.text}</p>
                  <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                    {r.tags.map(t=>{
                      const isActive=t===selected;
                      const lbl=issues.find(i=>i.tag===t)?.label||t.replace(/_/g,' ');
                      return(
                        <span key={t} style={{background:isActive?sc.bc:'rgba(0,0,0,0.07)',color:isActive?sc.tc:C.ts,fontSize:10,fontWeight:isActive?600:400,padding:'2px 8px',borderRadius:99}}>{lbl}</span>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </Card>
      </div>
    </div>
  );
}

function TopNav({active}){
  const go=(id)=>{
    if(id==='cover'){window.scrollTo({top:0,behavior:'smooth'});return;}
    const el=document.getElementById(id);
    if(el){
      const y=el.getBoundingClientRect().top+window.pageYOffset-62;
      window.scrollTo({top:y,behavior:'smooth'});
    }
  };
  return(
    <nav className="top-nav">
      <div className="nav-inner">
        <button onClick={()=>go('cover')} className="nav-brand" style={{background:'none',border:'none',cursor:'pointer',padding:0}}>Relaxia <span>Hotels</span></button>
        <div className="nav-links">
          {NAV_SECTIONS.map(s=>(
            <button key={s.id} onClick={()=>go(s.id)} className={`nav-link${active===s.id?' active':''}`} style={{background:'none',border:'none',cursor:'pointer'}}>{s.label}</button>
          ))}
        </div>
        <div className="nav-date">Gran Canaria · abr. 2026</div>
      </div>
    </nav>
  );
}

function SectionWrap({id,children,alt=false}){
  return(
    <section id={id} className={alt?'sec-alt':''}>
      <div className="sec-wrap">{children}</div>
    </section>
  );
}

function App(){
  const [active,setActive]=useState('cover');

  useEffect(()=>{
    const ALL_IDS=['cover','overview','prices','reputation','visibility','events','market','property','voice','plan'];
    const obs=new IntersectionObserver(
      entries=>entries.forEach(e=>{ if(e.isIntersecting) setActive(e.target.id); }),
      {rootMargin:'-58px 0px -50% 0px',threshold:0}
    );
    ALL_IDS.forEach(id=>{ const el=document.getElementById(id); if(el) obs.observe(el); });
    return()=>obs.disconnect();
  },[]);

  return(
    <div style={{fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",background:C.bg}}>
      <TopNav active={active}/>
      <section id="cover"><Cover/></section>
      <SectionWrap id="overview"><Overview/></SectionWrap>
      <SectionWrap id="prices" alt><Prices/></SectionWrap>
      <SectionWrap id="reputation"><Reputation/></SectionWrap>
      <SectionWrap id="visibility" alt><Visibility/></SectionWrap>
      <SectionWrap id="events"><Events/></SectionWrap>
      <SectionWrap id="market" alt><Market/></SectionWrap>
      <SectionWrap id="property"><Property/></SectionWrap>
      <SectionWrap id="voice" alt><Voice/></SectionWrap>
      <SectionWrap id="plan"><ActionPlan/></SectionWrap>
      <footer style={{textAlign:'center',padding:'32px',fontSize:12,color:'#9CA3AF',borderTop:'1px solid #E5E7EB',background:'#F9FAFB'}}>
        Hospitality Intelligence · Relaxia Hotels · Gran Canaria · 2026 · Astara Intelligence
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
